[[language]]
name = "bash"
file-types = [
  "sh",
  "bash",
  "zsh",
  ".bash_login",
  ".bash_logout",
  ".bash_profile",
  ".bashrc",
  ".profile",
  ".zshenv",
  ".zlogin",
  ".zlogout",
  ".zprofile",
  ".zshrc",
  ".bash_alias",
  ".bash_path",
]

[[language]]
name = "javascript"
config = { hostInfo = "helix", locale = "zh-CN" }

[[language]]
name = "jsx"
config = { hostInfo = "helix", locale = "zh-CN" }

[[language]]
name = "typescript"
config = { hostInfo = "helix", locale = "zh-CN" }

[[language]]
name = "tsx"
config = { hostInfo = "helix", locale = "zh-CN" }

[[language]]
name = "css"
file-types = ["css", "scss", "less"]

[[language]]
name = "php"
config = { licenceKey = "/Users/erasin/.config/php/intelephenser_licence.txt", locale = "zh" }

[[language]]
name = "python"
file-types = ["py", "pyi"]
roots = ["pyproject.toml", "pyrightconfig.json"]
language-server = { command = "pyright-langserver", args = ["--stdio"] }
# config = { "analysis" = { "autoSearchPaths" = true, "diagnosticMode" = "workspace", "useLibraryCodeForTypes" = true } }
config = {}

[[language]]
name = "gdscript"
language-server = { command = "nc", args = ["127.0.0.1", "6008"] } # 通过 nc 转发

[[language]]
name = "glsl"
file-types = ["glsl", "vert", "tesc", "tese", "geom", "frag", "comp", "shader"]

[[grammar]]
name = "wgsl"
source = { git = "https://github.com/szebniok/tree-sitter-wgsl", rev = "272e89ef2aeac74178edb9db4a83c1ffef80a463" }

[[grammar]]
name = "svelte"
source = { git = "https://github.com/Himujjal/tree-sitter-svelte", rev = "52e122ae68b316d3aa960a0a422d3645ba717f42" }

# dev
[[language]]
name = "markdown"
indent = { tab-width = 4, unit = "    " }
file-types = ["md", "markdown"]
roots = [".git"]
language-server = { command = "marksman", args = [
  "server",
], language-id = "markdown" }

[[language]]
name = "plantuml"
scope = "source.puml"
injection-regex = "plantuml"
file-types = ["puml", "pu", "wsd"]
roots = []
comment-token = "'"
indent = { tab-width = 2, unit = "  " }

