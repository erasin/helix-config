[[language]]
name = "bash"
file-types = [
  "sh",
  "bash",
  "zsh",
  ".bash_login",
  ".bash_logout",
  ".bash_profile",
  ".bashrc",
  ".profile",
  ".zshenv",
  ".zlogin",
  ".zlogout",
  ".zprofile",
  ".zshrc",
  ".bash_alias",
  ".bash_path",
]
[[language]]
name = "typescript"
config = { hostInfo = "helix", locale = "zh-CN" }

[[language]]
name = "tsx"
config = { hostInfo = "helix", locale = "zh-CN" }

# [[language]]
# name = "php"
# config = { licenceKey= "", locale = "zh-CN" }

[[language]]
name = "python"
file-types = ["py", "pyi"]
language-server = { command = "pyright-langserver", args = ["--stdio"] }
config = { python = { "analysis" = { "autoSearchPaths" = true, "diagnosticMode" = "workspace", "useLibraryCodeForTypes" = true } } }
# config = """
# {
#   "python": {
#     "analysis": {
#       "autoSearchPaths": true,
#       "diagnosticMode": "workspace",
#       "useLibraryCodeForTypes": true
#     }
#   }
# }
# """


[[language]]
name = "markdown"
indent = { tab-width = 4, unit = "    " }
file-types = ["md", "markdown"]
# language-server = { command = "common-mark-language-server", args = [] }
# language-server = { command = "remark-language-server", args = [] }
language-server = { command = "unified-language-server", args = [
  "--parser=remark-parse",
  "--stdio",
], language-id = "markdown" }

[[language]]
name = "beancount"
scope = "scope.bean"
roots = []
injection-regex = "bean"
file-types = ["bean", "beancount"]
comment-token = ";"
indent = { tab-width = 2, unit = "  " }
# language-server = { command = "beancount-language-server", args = ["--stdio"] }
# auto-format = true

[[language]]
name = "plantuml"
scope = "source.puml"
injection-regex = "plantuml"
file-types = ["puml", "pu", "wsd"]
roots = []
comment-token = "'"
indent = { tab-width = 2, unit = "  " }

# [[grammar]]
# name = "plantuml"
# source = { git = "https://github.com/lyndsysimon/tree-sitter-plantuml", rev = "fe25cf8592ea12ad6de00379a444d376ba32c7b5"  }

[[language]]
name = "haxe"
scope = "source.hx"
injection-regex = "haxe"
file-types = ["hx"]
roots = [".git"]
comment-token = "//"
indent = { tab-width = 4, unit = "    " }
language-server = { command = "node", args = [
  "/Users/erasin/.vscode/extensions/nadako.vshaxe-2.24.0/bin/server.js",
], language-id = "Haxe" }
auto-format = true
# https://github.com/vshaxe/haxe-language-server

[[grammar]]
name = "haxe"
source = { git = "https://github.com/vantreeseba/tree-sitter-haxe", rev = "63f5fcc144444e66ad146094174680ec8d24e361" }


[[language]]
name = "dot"
scope = "source.dot"
injection-regex = "dot"
file-types = ["dot"]
roots = []
comment-token = "//"
indent = { tab-width = 4, unit = "    " }
language-server = { command = "dot-language-server", args = ["--stdio"] }

[[grammar]]
name = "dot"
source = { git = "https://github.com/rydesun/tree-sitter-dot", rev = "917230743aa10f45a408fea2ddb54bbbf5fbe7b7" }

[[language]]
name = "glsl"
file-types = ["glsl", "vert", "tesc", "tese", "geom", "frag", "comp", "shader"]

[[grammar]]
name = "svelte"
source = { git = "https://github.com/Himujjal/tree-sitter-svelte", rev = "52e122ae68b316d3aa960a0a422d3645ba717f42" }

[[language]]
name = "ruby"
roots = [".git"]

[[language]]
name = "http"
scope = "source.http"
injection-regex = "http"
file-types = ["http", "rest"]
roots = []
comment-token = "#"
indent = { tab-width = 2, unit = "  " }
# language-server = { command = "", args = ["--stdio"] }

[[grammar]]
name = "http"
source = { git = "https://github.com/NTBBloodbath/tree-sitter-http", rev = "bfddd16b1cf78e0042fd1f6846a179f76a254e20" }

[[language]]
name = "gdscript"
language-server = { command = "nc", args = ["127.0.0.1", "6008"] } # 通过 nc 转发


